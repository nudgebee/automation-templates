name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: Validate templates + manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml jsonschema
      - name: Validate templates against schema
        run: python3 scripts/validate.py
      - name: Check manifest.yaml is up to date
        run: python3 scripts/gen_manifest.py --check
